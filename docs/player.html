<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Player</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    nav { margin-bottom: 20px; }
    nav a { margin-right: 12px; text-decoration: none; color: #0a66c2; }
    nav a:hover { text-decoration: underline; }
    .row { margin-bottom: 12px; }
    ul { padding-left: 18px; }
    li { margin: 6px 0; }
    .track-item { display: flex; align-items: center; gap: 8px; }
    .track-actions { display: inline-flex; gap: 6px; }
    .icon-btn { padding: 3px 7px; font-size: 14px; line-height: 1; }
    .track-name { cursor: default; }
    button { margin-right: 8px; padding: 6px 10px; }
    pre { background: #f5f5f5; padding: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <nav>
    <a href="/login.html">Login / Save Token</a>
    <a href="/player.html">Player</a>
  </nav>

  <h1>Spotify Player</h1>
  <div class="row">
    <label>
      Temporary Username:
      <input id="tokenKey" placeholder="Use generated name (e.g. blue-otter-42)" />
    </label>
    <button id="load">Load</button>
  </div>

  <div class="row">
    <button id="loadPlaylists" disabled>Load Playlists</button>
    <button id="playPlaylist" disabled>Play Selected Playlist</button>
    <button id="pausePlayback" disabled>Pause</button>
    <button id="stopPlayback" disabled>Stop</button>
    <label>
      Volume:
      <input id="volumePercent" type="number" min="0" max="100" value="80" style="width: 70px;" />
    </label>
    <button id="setVolume" disabled>Set Volume</button>
  </div>

  <div class="row" id="selectedPlaylist">Selected: none</div>

  <h3>Playlists</h3>
  <ul id="playlists"></ul>

  <h3>Tracks</h3>
  <ul id="tracks"></ul>

  <pre id="status"></pre>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script type="module" src="./app-player.js"></script>
</body>
</html>
